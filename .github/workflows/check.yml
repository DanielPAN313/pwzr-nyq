name: Check

on:
  push:
    branches: [main, feature-miniprogram-flow]
  pull_request:
  workflow_dispatch:

jobs:
  miniprogram-preview:
    name: Mini Program preview checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
